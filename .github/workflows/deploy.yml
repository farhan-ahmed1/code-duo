name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PNPM_VERSION: 9
  NODE_VERSION: 20

jobs:
  # Run CI checks first
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  deploy-server:
    name: Deploy Server
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.ref == 'refs/heads/main'
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Option 1: Deploy to Fly.io
      - name: Install Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master
        if: env.FLY_API_TOKEN != ''

      - name: Deploy server to Fly.io
        if: env.FLY_API_TOKEN != ''
        run: flyctl deploy --config apps/server/fly.toml --remote-only

      # Option 2: Deploy via Docker to any VPS with SSH
      - name: Deploy via SSH (VPS)
        if: env.DEPLOY_HOST != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/code-duo
            git pull origin main
            docker compose up -d --build server

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.ref == 'refs/heads/main'
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Option 1: Deploy to Vercel
      - name: Deploy to Vercel
        if: env.VERCEL_TOKEN != ''
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: --prod
          working-directory: apps/web

      # Option 2: Deploy to Fly.io
      - name: Install Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master
        if: env.FLY_API_TOKEN != '' && env.VERCEL_TOKEN == ''

      - name: Deploy web to Fly.io
        if: env.FLY_API_TOKEN != '' && env.VERCEL_TOKEN == ''
        run: flyctl deploy --config apps/web/fly.toml --remote-only
