<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630" /><line x1="60" y1="0" x2="60" y2="630" />
    <line x1="120" y1="0" x2="120" y2="630" /><line x1="180" y1="0" x2="180" y2="630" />
    <line x1="240" y1="0" x2="240" y2="630" /><line x1="300" y1="0" x2="300" y2="630" />
    <line x1="360" y1="0" x2="360" y2="630" /><line x1="420" y1="0" x2="420" y2="630" />
    <line x1="480" y1="0" x2="480" y2="630" /><line x1="540" y1="0" x2="540" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" /><line x1="660" y1="0" x2="660" y2="630" />
    <line x1="720" y1="0" x2="720" y2="630" /><line x1="780" y1="0" x2="780" y2="630" />
    <line x1="840" y1="0" x2="840" y2="630" /><line x1="900" y1="0" x2="900" y2="630" />
    <line x1="960" y1="0" x2="960" y2="630" /><line x1="1020" y1="0" x2="1020" y2="630" />
    <line x1="1080" y1="0" x2="1080" y2="630" /><line x1="1140" y1="0" x2="1140" y2="630" />
    <line x1="0" y1="60" x2="1200" y2="60" /><line x1="0" y1="120" x2="1200" y2="120" />
    <line x1="0" y1="180" x2="1200" y2="180" /><line x1="0" y1="240" x2="1200" y2="240" />
    <line x1="0" y1="300" x2="1200" y2="300" /><line x1="0" y1="360" x2="1200" y2="360" />
    <line x1="0" y1="420" x2="1200" y2="420" /><line x1="0" y1="480" x2="1200" y2="480" />
    <line x1="0" y1="540" x2="1200" y2="540" /><line x1="0" y1="600" x2="1200" y2="600" />
  </g>

  <!-- Accent line at top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)" />

  <!-- Code Duo wordmark -->
  <text x="600" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff">
    Code Duo
  </text>

  <!-- Tagline -->
  <text x="600" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8">
    Real-time collaborative coding, powered by CRDTs
  </text>

  <!-- Two cursor icons -->
  <g transform="translate(510, 360)">
    <!-- Cursor 1 -->
    <polygon points="0,0 0,32 8,24 16,32" fill="#3b82f6" />
    <text x="20" y="28" font-family="system-ui, sans-serif" font-size="14" fill="#3b82f6" font-weight="600">Alice</text>
  </g>
  <g transform="translate(610, 370)">
    <!-- Cursor 2 -->
    <polygon points="0,0 0,32 8,24 16,32" fill="#f97316" />
    <text x="20" y="28" font-family="system-ui, sans-serif" font-size="14" fill="#f97316" font-weight="600">Bob</text>
  </g>

  <!-- Feature pills -->
  <g transform="translate(340, 450)">
    <rect x="0" y="0" width="140" height="36" rx="18" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.1" />
    <text x="70" y="23" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">Live Cursors</text>
  </g>
  <g transform="translate(510, 450)">
    <rect x="0" y="0" width="180" height="36" rx="18" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.1" />
    <text x="90" y="23" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">Zero Conflicts</text>
  </g>
  <g transform="translate(720, 450)">
    <rect x="0" y="0" width="150" height="36" rx="18" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.1" />
    <text x="75" y="23" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">Offline-First</text>
  </g>

  <!-- Bottom URL -->
  <text x="600" y="570" text-anchor="middle" font-family="monospace" font-size="18" fill="#475569">codeduo.dev</text>
</svg>
