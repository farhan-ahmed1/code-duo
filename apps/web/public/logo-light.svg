<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background — light -->
  <rect width="512" height="512" rx="112" fill="#eef2fb"/>

  <!-- Subtle inner border -->
  <rect x="1.5" y="1.5" width="509" height="509" rx="111" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="1.5"/>

  <!-- Connection line (dashed) -->
  <line x1="170" y1="256" x2="342" y2="256" stroke="rgba(0,0,0,0.12)" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 8"/>

  <!-- Left node — blue -->
  <circle cx="144" cy="256" r="72" fill="rgba(43,127,255,0.07)"/>
  <circle cx="144" cy="256" r="54" fill="rgba(43,127,255,0.1)" stroke="#2b7fff" stroke-width="5" stroke-opacity="0.5"/>
  <circle cx="144" cy="256" r="28" fill="rgba(43,127,255,0.18)" stroke="#2b7fff" stroke-width="3"/>
  <circle cx="144" cy="256" r="14" fill="#2b7fff"/>

  <!-- Right node — green -->
  <circle cx="368" cy="256" r="72" fill="rgba(20,163,122,0.07)"/>
  <circle cx="368" cy="256" r="54" fill="rgba(20,163,122,0.1)" stroke="#14a37a" stroke-width="5" stroke-opacity="0.5"/>
  <circle cx="368" cy="256" r="28" fill="rgba(20,163,122,0.18)" stroke="#14a37a" stroke-width="3"/>
  <circle cx="368" cy="256" r="14" fill="#14a37a"/>

  <!-- Center sync node -->
  <circle cx="256" cy="256" r="16" fill="rgba(0,0,0,0.04)" stroke="rgba(0,0,0,0.14)" stroke-width="2"/>
  <circle cx="256" cy="256" r="7" fill="rgba(0,0,0,0.3)"/>
</svg>
