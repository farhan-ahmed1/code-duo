<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#111318"/>
  
  <!-- Subtle inner border glow -->
  <rect x="1.5" y="1.5" width="509" height="509" rx="111" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>

  <!-- Connection line (dashed) -->
  <line x1="170" y1="256" x2="342" y2="256" stroke="rgba(255,255,255,0.1)" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 8"/>

  <!-- Left node — blue -->
  <!-- outer glow ring -->
  <circle cx="144" cy="256" r="72" fill="rgba(77,148,255,0.06)"/>
  <!-- ring -->
  <circle cx="144" cy="256" r="54" fill="rgba(77,148,255,0.08)" stroke="#4d94ff" stroke-width="5" stroke-opacity="0.5"/>
  <!-- inner fill -->
  <circle cx="144" cy="256" r="28" fill="rgba(77,148,255,0.18)" stroke="#4d94ff" stroke-width="3"/>
  <!-- core dot -->
  <circle cx="144" cy="256" r="14" fill="#4d94ff"/>

  <!-- Right node — green -->
  <!-- outer glow ring -->
  <circle cx="368" cy="256" r="72" fill="rgba(62,207,142,0.06)"/>
  <!-- ring -->
  <circle cx="368" cy="256" r="54" fill="rgba(62,207,142,0.08)" stroke="#3ecf8e" stroke-width="5" stroke-opacity="0.5"/>
  <!-- inner fill -->
  <circle cx="368" cy="256" r="28" fill="rgba(62,207,142,0.18)" stroke="#3ecf8e" stroke-width="3"/>
  <!-- core dot -->
  <circle cx="368" cy="256" r="14" fill="#3ecf8e"/>

  <!-- Center sync node -->
  <circle cx="256" cy="256" r="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <circle cx="256" cy="256" r="7" fill="rgba(255,255,255,0.35)"/>
</svg>
